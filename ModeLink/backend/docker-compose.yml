services:
  db:
    image: postgres:16-alpine
    container_name: modelink-postgres
    environment:
      POSTGRES_DB: modelink
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - modelink_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d modelink"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  modelink_pg:
